# Nginx site config for BNB Banking Agents
# Place at /etc/nginx/sites-enabled/default
# Serves React dashboard at / and proxies API to FastAPI backend on port 8000

server {
    server_name 135-116-65-177.sslip.io;

    # API endpoints — proxy to FastAPI backend
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # Swagger/OpenAPI docs
    location /docs {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # React dashboard — serve static build files
    location / {
        root /home/admin/bnb-banking-agents/dashboard/build;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/135-116-65-177.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/135-116-65-177.sslip.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = 135-116-65-177.sslip.io) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name 135-116-65-177.sslip.io;
    return 404;
}
